[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor chamber]
sensor_type: ATC Semitec 104NT-4-R025H42G
pullup_resistor: 4700
sensor_pin: expander:PA6
gcode_id: T2

#####################################################################
#   Filament Runout Sensor
#####################################################################

# setup for in-feet v0.2 bearing + switch sensor - not stable - waiting for BTT FRS
# [filament_switch_sensor filament_sensor]
# pause_on_runout: true
# runout_gcode: PAUSE
# switch_pin: gpio16
# insert_gcode:
#     M117 Insert Detected
#     LED_PRINTING
# runout_gcode:
#     M117 Runout Detected
#     LED_ERROR
#     #BEEP I=12

# setup for BTT SFS v2.0 with endstop (as above) used for filament detection, and probe pins used for tangling detection
[filament_switch_sensor switch_sensor]
switch_pin: ^gpio16 # e0-stop
pause_on_runout: true
runout_gcode:
  PAUSE # [pause resume] is required in printer.cfg
  M117 Filament runout
insert_gcode:
  M117 Filament inserted

[filament_motion_sensor encoder_sensor]
switch_pin: ^gpio22 # probe signal and ground
detection_length: 2.88 # accuracy of motion sensor 2.88mm 
extruder: extruder 
pause_on_runout: true 
runout_gcode:
  PAUSE # [pause resume] is required in printer.cfg
  M117 Filament stuck
insert_gcode:
  M117 Filament unstuck
